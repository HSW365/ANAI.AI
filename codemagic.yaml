- name: Set version and build number
        script: |
          # Use a fallback of 0 if no build exists yet
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID")
          BUILD_NUMBER=$((${LATEST_BUILD:-0} + 1))
          cd ios/App
          # marketing version must match your App Store Connect version (1.0.0)
          agvtool new-marketing-version 1.0.0
          agvtool new-version -all $BUILD_NUMBER
    
